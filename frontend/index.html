<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B3 UMDF Market Data Viewer</title>
<style>
  :root {
    --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
    --text: #e0e0e0; --muted: #8899aa; --accent: #00d2ff;
    --green: #00c853; --red: #ff1744; --yellow: #ffd600;
    --border: #2a3a5e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  code, .mono { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }
  h3 { font-size: .85rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .5rem; }
  button { cursor: pointer; border: 1px solid var(--border); background: var(--bg3); color: var(--text); padding: .35rem .75rem; border-radius: 4px; font-size: .8rem; }
  button:hover { background: var(--accent); color: #000; }
  button:disabled { opacity: .4; cursor: default; background: var(--bg3); color: var(--text); }
  input, select { background: var(--bg2); color: var(--text); border: 1px solid var(--border); padding: .35rem .5rem; border-radius: 4px; font-size: .8rem; }
  input:focus { outline: 1px solid var(--accent); }
  label { font-size: .8rem; display: flex; align-items: center; gap: .3rem; }

  /* Layout */
  .toolbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: .5rem 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .toolbar .title { font-weight: 700; color: var(--accent); font-size: 1rem; margin-right: 1rem; }
  .toolbar .group { display: flex; align-items: center; gap: .5rem; }
  .toolbar .sep { width: 1px; height: 24px; background: var(--border); }
  .status { display: inline-flex; align-items: center; gap: .3rem; font-size: .8rem; }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.off { background: #666; } .dot.on { background: var(--green); } .dot.err { background: var(--red); }

  .main { flex: 1; display: grid; grid-template-columns: 220px 1fr; overflow: hidden; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: .75rem; overflow-y: auto; display: flex; flex-direction: column; gap: .75rem; }
  .content { display: flex; flex-direction: column; overflow: hidden; }
  .panels { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden; }
  .panel { border: 1px solid var(--border); margin: .5rem; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; }
  .panel-head { background: var(--bg3); padding: .4rem .7rem; font-size: .75rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  .panel-body { flex: 1; padding: .5rem; overflow-y: auto; font-size: .8rem; }

  /* Book table */
  .book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
  .book-side { }
  .book-side h4 { font-size: .7rem; text-transform: uppercase; color: var(--muted); margin-bottom: .3rem; text-align: center; }
  .book-side table { width: 100%; border-collapse: collapse; }
  .book-side th, .book-side td { padding: .15rem .4rem; font-size: .75rem; font-family: 'Cascadia Code', monospace; text-align: right; }
  .book-side th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
  .bid-price { color: var(--green); } .ask-price { color: var(--red); }

  /* Info grid */
  .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .25rem .75rem; }
  .info-item { display: flex; justify-content: space-between; font-size: .75rem; padding: .15rem 0; border-bottom: 1px solid rgba(255,255,255,.05); }
  .info-label { color: var(--muted); } .info-value { font-family: monospace; font-weight: 600; }

  /* Log */
  .log-area { flex: 0 0 220px; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
  .log-head { background: var(--bg3); padding: .4rem .7rem; font-size: .75rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
  .log-body { flex: 1; overflow-y: auto; padding: .25rem .5rem; font-family: monospace; font-size: .7rem; line-height: 1.6; }
  .log-entry { white-space: nowrap; }
  .log-ts { color: var(--muted); } .log-type { font-weight: 600; }
  .log-sub-ok { color: var(--green); } .log-error { color: var(--red); } .log-book { color: var(--accent); }
  .log-info { color: var(--yellow); } .log-order { color: #b388ff; } .log-trade { color: #ff9100; }

  /* Subscriptions list */
  .sub-list { list-style: none; }
  .sub-item { padding: .3rem .4rem; border-radius: 4px; cursor: pointer; font-size: .8rem; display: flex; justify-content: space-between; align-items: center; }
  .sub-item:hover { background: var(--bg3); }
  .sub-item.active { background: var(--bg3); border-left: 2px solid var(--accent); }
  .sub-item .flags { font-size: .65rem; color: var(--muted); }
  .sub-unsub { background: none; border: none; color: var(--red); font-size: .7rem; padding: .1rem .3rem; cursor: pointer; }

  .empty-msg { color: var(--muted); font-style: italic; font-size: .8rem; text-align: center; padding: 2rem; }

  /* Stats bar */
  .stats-bar { background: var(--bg2); border-top: 1px solid var(--border); padding: .3rem 1rem; font-size: .7rem; color: var(--muted); display: flex; gap: 1.5rem; }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <span class="title">B3 UMDF Viewer</span>
  <div class="group">
    <input id="wsUrl" type="text" value="ws://localhost:8080/ws" style="width:240px" placeholder="WebSocket URL">
    <button id="btnConnect" onclick="toggleConnection()">Connect</button>
    <span class="status"><span id="statusDot" class="dot off"></span><span id="statusText">Disconnected</span></span>
  </div>
  <div class="sep"></div>
  <div class="group">
    <input id="symbolInput" type="text" placeholder="Symbol (e.g. PETR4)" style="width:140px" onkeydown="if(event.key==='Enter') doSubscribe()">
    <label><input id="flagBook" type="checkbox" checked> Book</label>
    <label><input id="flagInfo" type="checkbox" checked> Info</label>
    <button id="btnSubscribe" onclick="doSubscribe()" disabled>Subscribe</button>
    <button id="btnGet" onclick="doGet()" disabled>Get</button>
  </div>
  <div class="sep"></div>
  <div class="group">
    <label>Price decimals: <input id="priceDecimals" type="number" value="8" min="0" max="12" style="width:50px"></label>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar: subscriptions -->
  <div class="sidebar">
    <div>
      <h3>Subscriptions</h3>
      <ul id="subList" class="sub-list"></ul>
      <div id="subEmpty" class="empty-msg">No active subscriptions</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="panels">
      <!-- Book panel -->
      <div class="panel">
        <div class="panel-head" id="bookTitle">Order Book</div>
        <div class="panel-body" id="bookBody">
          <div class="empty-msg">Subscribe to see order book</div>
        </div>
      </div>
      <!-- Info panel -->
      <div class="panel">
        <div class="panel-head" id="infoTitle">Instrument Info</div>
        <div class="panel-body" id="infoBody">
          <div class="empty-msg">Subscribe to see instrument info</div>
        </div>
      </div>
    </div>

    <!-- Event log -->
    <div class="log-area">
      <div class="log-head">
        <span>Event Log</span>
        <button onclick="clearLog()" style="font-size:.65rem;padding:.1rem .4rem">Clear</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>
</div>

<!-- Stats bar -->
<div class="stats-bar">
  <span>Messages: <strong id="statMsgs">0</strong></span>
  <span>Book snapshots: <strong id="statBooks">0</strong></span>
  <span>Info updates: <strong id="statInfo">0</strong></span>
  <span>Orders: <strong id="statOrders">0</strong></span>
  <span>Trades: <strong id="statTrades">0</strong></span>
</div>

<script>
// ── Protocol constants ──
const MSG = {
  SUBSCRIBE: 0x0001, UNSUBSCRIBE: 0x0002, GET: 0x0003,
  SUBSCRIBE_OK: 0x0010, SUBSCRIBE_ERROR: 0x0011, UNSUBSCRIBED: 0x0012,
  BOOK_SNAPSHOT: 0x0020, INFO_SNAPSHOT: 0x0021,
  ORDER_ADDED: 0x0030, ORDER_UPDATED: 0x0031, ORDER_DELETED: 0x0032,
  TRADE: 0x0033, BOOK_CLEARED: 0x0034,
};

const MSG_NAMES = {};
for (const [k, v] of Object.entries(MSG)) MSG_NAMES[v] = k;

const DATA_FLAGS = { BOOK: 0x01, INFO: 0x02, ALL: 0x03 };

const INFO_FIELDS = [
  'OpeningPrice', 'ClosingPrice', 'HighPrice', 'LowPrice',
  'LastTradePrice', 'LastTradeSize', 'SettlementPrice', 'TheoreticalOpeningPrice',
  'TheoreticalOpeningSize', 'AuctionImbalanceSize', 'TradeVolume', 'VwapPrice',
  'NetChange', 'NumberOfTrades', 'OpenInterest', 'PriceBandLow',
  'PriceBandHigh', 'TradingReferencePrice', 'AvgDailyTradedQty', 'MaxTradeVol',
  'TradingStatus', 'TradingEvent',
];

// Fields that represent prices (display with decimal formatting)
const PRICE_FIELDS = new Set([
  'OpeningPrice', 'ClosingPrice', 'HighPrice', 'LowPrice',
  'LastTradePrice', 'SettlementPrice', 'TheoreticalOpeningPrice',
  'VwapPrice', 'NetChange', 'PriceBandLow', 'PriceBandHigh', 'TradingReferencePrice',
]);

// ── State ──
let ws = null;
const subscriptions = new Map(); // securityId (string) → { symbol, flags, book, info, orderCount, tradeCount }
let selectedSecurityId = null;
let stats = { msgs: 0, books: 0, info: 0, orders: 0, trades: 0 };

// ── Helpers ──
const $ = id => document.getElementById(id);
const encoder = new TextEncoder();
const decoder = new TextDecoder();

function getFlags() {
  let f = 0;
  if ($('flagBook').checked) f |= DATA_FLAGS.BOOK;
  if ($('flagInfo').checked) f |= DATA_FLAGS.INFO;
  return f || DATA_FLAGS.ALL;
}

function flagsStr(f) {
  const parts = [];
  if (f & DATA_FLAGS.BOOK) parts.push('Book');
  if (f & DATA_FLAGS.INFO) parts.push('Info');
  return parts.join('+') || 'None';
}

function formatPrice(mantissa) {
  const dec = parseInt($('priceDecimals').value) || 0;
  if (dec === 0) return mantissa.toLocaleString();
  const divisor = Math.pow(10, dec);
  return (mantissa / divisor).toFixed(Math.min(dec, 4));
}

function formatQty(v) { return v.toLocaleString(); }

function ts() {
  const d = new Date();
  return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function secIdStr(bigint) { return bigint.toString(); }

// ── Message builders ──
function buildSubscribeOrGet(msgType, symbol, flags) {
  const symBytes = encoder.encode(symbol.toUpperCase().trim());
  const totalLen = 4 + 1 + 1 + symBytes.length;
  const buf = new ArrayBuffer(totalLen);
  const v = new DataView(buf);
  v.setUint16(0, totalLen, true);
  v.setUint16(2, msgType, true);
  v.setUint8(4, flags);
  v.setUint8(5, symBytes.length);
  new Uint8Array(buf, 6).set(symBytes);
  return buf;
}

function buildUnsubscribe(securityId) {
  const buf = new ArrayBuffer(12);
  const v = new DataView(buf);
  v.setUint16(0, 12, true);
  v.setUint16(2, MSG.UNSUBSCRIBE, true);
  v.setBigUint64(4, securityId, true);
  return buf;
}

// ── Message parser ──
function parseMessage(data) {
  const v = new DataView(data);
  if (data.byteLength < 4) return null;
  const length = v.getUint16(0, true);
  const type = v.getUint16(2, true);
  let o = 4; // offset past header

  switch (type) {
    case MSG.SUBSCRIBE_OK: {
      const securityId = v.getBigUint64(o, true); o += 8;
      const flags = v.getUint8(o); o += 1;
      const sLen = v.getUint8(o); o += 1;
      const symbol = decoder.decode(new Uint8Array(data, o, sLen));
      return { type: 'SubscribeOk', securityId, flags, symbol };
    }
    case MSG.SUBSCRIBE_ERROR: {
      const errorCode = v.getUint8(o); o += 1;
      const sLen = v.getUint8(o); o += 1;
      const symbol = decoder.decode(new Uint8Array(data, o, sLen));
      const errorNames = { 1: 'UnknownSymbol', 2: 'NotReady' };
      return { type: 'SubscribeError', errorCode, errorName: errorNames[errorCode] || `Code ${errorCode}`, symbol };
    }
    case MSG.UNSUBSCRIBED: {
      const securityId = v.getBigUint64(o, true);
      return { type: 'Unsubscribed', securityId };
    }
    case MSG.BOOK_SNAPSHOT: {
      const securityId = v.getBigUint64(o, true); o += 8;
      const rptSeq = v.getUint32(o, true); o += 4;
      const bidCount = v.getUint16(o, true); o += 2;
      const askCount = v.getUint16(o, true); o += 2;
      const bids = [], asks = [];
      for (let i = 0; i < bidCount; i++) {
        const price = Number(v.getBigInt64(o, true)); o += 8;
        const qty = Number(v.getBigInt64(o, true)); o += 8;
        const count = v.getUint16(o, true); o += 2;
        bids.push({ price, qty, count });
      }
      for (let i = 0; i < askCount; i++) {
        const price = Number(v.getBigInt64(o, true)); o += 8;
        const qty = Number(v.getBigInt64(o, true)); o += 8;
        const count = v.getUint16(o, true); o += 2;
        asks.push({ price, qty, count });
      }
      return { type: 'BookSnapshot', securityId, rptSeq, bids, asks };
    }
    case MSG.INFO_SNAPSHOT: {
      const securityId = v.getBigUint64(o, true); o += 8;
      const mask = v.getUint32(o, true); o += 4;
      const fields = {};
      for (let i = 0; i < INFO_FIELDS.length; i++) {
        if (mask & (1 << i)) {
          fields[INFO_FIELDS[i]] = Number(v.getBigInt64(o, true));
          o += 8;
        }
      }
      return { type: 'InfoSnapshot', securityId, fields };
    }
    case MSG.ORDER_ADDED:
    case MSG.ORDER_UPDATED: {
      const securityId = v.getBigUint64(o, true); o += 8;
      const orderId = v.getBigUint64(o, true); o += 8;
      const side = v.getUint8(o); o += 1;
      const price = Number(v.getBigInt64(o, true)); o += 8;
      const qty = Number(v.getBigInt64(o, true));
      const typeName = type === MSG.ORDER_ADDED ? 'OrderAdded' : 'OrderUpdated';
      return { type: typeName, securityId, orderId, side, price, qty };
    }
    case MSG.ORDER_DELETED: {
      const securityId = v.getBigUint64(o, true); o += 8;
      const orderId = v.getBigUint64(o, true); o += 8;
      const side = v.getUint8(o);
      return { type: 'OrderDeleted', securityId, orderId, side };
    }
    case MSG.TRADE: {
      const securityId = v.getBigUint64(o, true); o += 8;
      const price = Number(v.getBigInt64(o, true)); o += 8;
      const qty = Number(v.getBigInt64(o, true)); o += 8;
      const tradeId = Number(v.getBigInt64(o, true));
      return { type: 'Trade', securityId, price, qty, tradeId };
    }
    case MSG.BOOK_CLEARED: {
      const securityId = v.getBigUint64(o, true);
      return { type: 'BookCleared', securityId };
    }
    default:
      return { type: 'Unknown', msgType: type };
  }
}

// ── Connection ──
function toggleConnection() {
  if (ws && ws.readyState <= WebSocket.OPEN) { ws.close(); return; }
  const url = $('wsUrl').value.trim();
  if (!url) return;
  setStatus('connecting');
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    setStatus('connected');
    $('btnSubscribe').disabled = false;
    $('btnGet').disabled = false;
    $('btnConnect').textContent = 'Disconnect';
    addLog('Connected to ' + url, 'log-sub-ok');
  };
  ws.onclose = () => {
    setStatus('disconnected');
    $('btnSubscribe').disabled = true;
    $('btnGet').disabled = true;
    $('btnConnect').textContent = 'Connect';
    addLog('Disconnected', 'log-error');
  };
  ws.onerror = () => addLog('WebSocket error', 'log-error');
  ws.onmessage = (evt) => {
    if (!(evt.data instanceof ArrayBuffer)) return;
    stats.msgs++;
    const msg = parseMessage(evt.data);
    if (msg) handleMessage(msg);
    updateStats();
  };
}

function setStatus(state) {
  const dot = $('statusDot');
  const text = $('statusText');
  if (state === 'connected') { dot.className = 'dot on'; text.textContent = 'Connected'; }
  else if (state === 'connecting') { dot.className = 'dot off'; text.textContent = 'Connecting...'; }
  else { dot.className = 'dot off'; text.textContent = 'Disconnected'; }
}

// ── Actions ──
function doSubscribe() {
  const sym = $('symbolInput').value.trim().toUpperCase();
  if (!sym || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(buildSubscribeOrGet(MSG.SUBSCRIBE, sym, getFlags()));
  addLog(`→ Subscribe ${sym} [${flagsStr(getFlags())}]`, '');
}

function doGet() {
  const sym = $('symbolInput').value.trim().toUpperCase();
  if (!sym || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(buildSubscribeOrGet(MSG.GET, sym, getFlags()));
  addLog(`→ Get ${sym} [${flagsStr(getFlags())}]`, '');
}

function doUnsubscribe(securityIdStr) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const bigint = BigInt(securityIdStr);
  ws.send(buildUnsubscribe(bigint));
  addLog(`→ Unsubscribe id=${securityIdStr}`, '');
}

// ── Message handler ──
function handleMessage(msg) {
  switch (msg.type) {
    case 'SubscribeOk': {
      const id = secIdStr(msg.securityId);
      subscriptions.set(id, {
        symbol: msg.symbol, flags: msg.flags, securityId: msg.securityId,
        book: null, info: {}, orderCount: 0, tradeCount: 0,
      });
      if (!selectedSecurityId) selectSubscription(id);
      renderSubList();
      addLog(`SubscribeOk ${msg.symbol} id=${id} [${flagsStr(msg.flags)}]`, 'log-sub-ok');
      break;
    }
    case 'SubscribeError':
      addLog(`SubscribeError ${msg.symbol}: ${msg.errorName}`, 'log-error');
      break;
    case 'Unsubscribed': {
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      subscriptions.delete(id);
      if (selectedSecurityId === id) {
        selectedSecurityId = subscriptions.size > 0 ? subscriptions.keys().next().value : null;
        renderSelected();
      }
      renderSubList();
      addLog(`Unsubscribed ${sub?.symbol || id}`, 'log-error');
      break;
    }
    case 'BookSnapshot': {
      stats.books++;
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      if (sub) {
        sub.book = { rptSeq: msg.rptSeq, bids: msg.bids, asks: msg.asks };
        sub.orderCount = 0;
      }
      if (selectedSecurityId === id) renderBook();
      const sym = sub?.symbol || id;
      addLog(`BookSnapshot ${sym} seq=${msg.rptSeq} ${msg.bids.length}b/${msg.asks.length}a`, 'log-book');
      break;
    }
    case 'InfoSnapshot': {
      stats.info++;
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      if (sub) Object.assign(sub.info, msg.fields);
      if (selectedSecurityId === id) renderInfo();
      const sym = sub?.symbol || id;
      const n = Object.keys(msg.fields).length;
      addLog(`InfoSnapshot ${sym} ${n} fields`, 'log-info');
      break;
    }
    case 'OrderAdded':
    case 'OrderUpdated': {
      stats.orders++;
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      if (sub) sub.orderCount++;
      const side = msg.side === 0 ? 'BID' : 'ASK';
      const sym = sub?.symbol || id;
      addLog(`${msg.type} ${sym} ${side} ${formatPrice(msg.price)} x${formatQty(msg.qty)}`, 'log-order');
      break;
    }
    case 'OrderDeleted': {
      stats.orders++;
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      if (sub) sub.orderCount++;
      const side = msg.side === 0 ? 'BID' : 'ASK';
      const sym = sub?.symbol || id;
      addLog(`OrderDeleted ${sym} ${side} oid=${msg.orderId}`, 'log-order');
      break;
    }
    case 'Trade': {
      stats.trades++;
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      if (sub) sub.tradeCount++;
      const sym = sub?.symbol || id;
      addLog(`Trade ${sym} ${formatPrice(msg.price)} x${formatQty(msg.qty)}`, 'log-trade');
      break;
    }
    case 'BookCleared': {
      const id = secIdStr(msg.securityId);
      const sub = subscriptions.get(id);
      if (sub) sub.book = null;
      if (selectedSecurityId === id) renderBook();
      const sym = sub?.symbol || id;
      addLog(`BookCleared ${sym}`, 'log-book');
      break;
    }
  }
}

// ── UI rendering ──
function selectSubscription(id) {
  selectedSecurityId = id;
  renderSubList();
  renderSelected();
}

function renderSelected() {
  renderBook();
  renderInfo();
  const sub = subscriptions.get(selectedSecurityId);
  $('bookTitle').textContent = sub ? `Order Book — ${sub.symbol}` : 'Order Book';
  $('infoTitle').textContent = sub ? `Instrument Info — ${sub.symbol}` : 'Instrument Info';
}

function renderSubList() {
  const ul = $('subList');
  ul.innerHTML = '';
  $('subEmpty').style.display = subscriptions.size === 0 ? '' : 'none';
  for (const [id, sub] of subscriptions) {
    const li = document.createElement('li');
    li.className = 'sub-item' + (id === selectedSecurityId ? ' active' : '');
    li.innerHTML = `
      <span onclick="selectSubscription('${id}')" style="flex:1;cursor:pointer">
        <strong>${sub.symbol}</strong>
        <span class="flags">[${flagsStr(sub.flags)}]</span>
      </span>
      <button class="sub-unsub" onclick="doUnsubscribe('${id}')" title="Unsubscribe">✕</button>`;
    ul.appendChild(li);
  }
}

function renderBook() {
  const body = $('bookBody');
  const sub = subscriptions.get(selectedSecurityId);
  if (!sub || !sub.book) {
    body.innerHTML = '<div class="empty-msg">No book data</div>';
    return;
  }
  const { rptSeq, bids, asks } = sub.book;
  const maxLevels = 20;
  let html = `<div style="font-size:.7rem;color:var(--muted);margin-bottom:.4rem">rptSeq: ${rptSeq} | ${bids.length} bids, ${asks.length} asks | +${sub.orderCount} events since snapshot</div>`;
  html += '<div class="book-grid">';

  // Bids
  html += '<div class="book-side"><h4>Bids</h4><table><tr><th>Price</th><th>Qty</th><th>#</th></tr>';
  for (let i = 0; i < Math.min(bids.length, maxLevels); i++) {
    const b = bids[i];
    html += `<tr><td class="bid-price">${formatPrice(b.price)}</td><td>${formatQty(b.qty)}</td><td>${b.count}</td></tr>`;
  }
  if (bids.length > maxLevels) html += `<tr><td colspan="3" style="color:var(--muted);text-align:center">... ${bids.length - maxLevels} more</td></tr>`;
  if (bids.length === 0) html += '<tr><td colspan="3" style="color:var(--muted);text-align:center">empty</td></tr>';
  html += '</table></div>';

  // Asks
  html += '<div class="book-side"><h4>Asks</h4><table><tr><th>Price</th><th>Qty</th><th>#</th></tr>';
  for (let i = 0; i < Math.min(asks.length, maxLevels); i++) {
    const a = asks[i];
    html += `<tr><td class="ask-price">${formatPrice(a.price)}</td><td>${formatQty(a.qty)}</td><td>${a.count}</td></tr>`;
  }
  if (asks.length > maxLevels) html += `<tr><td colspan="3" style="color:var(--muted);text-align:center">... ${asks.length - maxLevels} more</td></tr>`;
  if (asks.length === 0) html += '<tr><td colspan="3" style="color:var(--muted);text-align:center">empty</td></tr>';
  html += '</table></div>';

  html += '</div>';
  body.innerHTML = html;
}

function renderInfo() {
  const body = $('infoBody');
  const sub = subscriptions.get(selectedSecurityId);
  if (!sub || Object.keys(sub.info).length === 0) {
    body.innerHTML = '<div class="empty-msg">No info data</div>';
    return;
  }
  let html = '<div class="info-grid">';
  for (const field of INFO_FIELDS) {
    if (!(field in sub.info)) continue;
    const raw = sub.info[field];
    let display;
    if (field === 'TradingStatus') display = tradingStatusName(raw);
    else if (field === 'TradingEvent') display = tradingEventName(raw);
    else if (PRICE_FIELDS.has(field)) display = formatPrice(raw);
    else display = formatQty(raw);
    html += `<div class="info-item"><span class="info-label">${field}</span><span class="info-value">${display}</span></div>`;
  }
  html += '</div>';
  body.innerHTML = html;
}

function tradingStatusName(v) {
  const names = { 2: 'Trading', 4: 'Forbidden', 17: 'Auction', 18: 'Closing', 20: 'Open', 21: 'PreClose', 101: 'FinalClosing' };
  return names[v] || `Status(${v})`;
}

function tradingEventName(v) {
  const names = { 0: 'None', 1: 'Change', 4: 'NewStatus', 101: 'PriceBand' };
  return names[v] || `Event(${v})`;
}

// ── Log ──
const MAX_LOG = 500;
let logCount = 0;

function addLog(text, cssClass) {
  const body = $('logBody');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-ts">${ts()}</span> <span class="${cssClass}">${text}</span>`;
  body.appendChild(div);
  logCount++;
  while (logCount > MAX_LOG) { body.removeChild(body.firstChild); logCount--; }
  body.scrollTop = body.scrollHeight;
}

function clearLog() { $('logBody').innerHTML = ''; logCount = 0; }

function updateStats() {
  $('statMsgs').textContent = stats.msgs.toLocaleString();
  $('statBooks').textContent = stats.books.toLocaleString();
  $('statInfo').textContent = stats.info.toLocaleString();
  $('statOrders').textContent = stats.orders.toLocaleString();
  $('statTrades').textContent = stats.trades.toLocaleString();
}

// ── Init ──
setStatus('disconnected');
</script>
</body>
