services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WS_PORT:-8080}:${WS_PORT:-8080}"
    volumes:
      - ./pcap:/app/pcap:ro
    environment:
      PCAP_DIR: /app/pcap
      PCAP_PREFIX: "${PCAP_PREFIX:-20250331_MBO_084_EQT,20250929_MBO_072_DRV}"
      WS_PORT: "${WS_PORT:-8080}"
      REPLAY_SPEED: "${REPLAY_SPEED:-5}"
    restart: unless-stopped
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
